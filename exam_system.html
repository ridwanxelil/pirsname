<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sınav Sistemi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' font-size='72' x='12'>📚</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --P:#2563eb;--PD:#1d4ed8;--PL:#dbeafe;
  --S:#059669;--SL:#d1fae5;
  --D:#dc2626;--DL:#fee2e2;
  --W:#d97706;--WL:#fef3c7;
  --V:#7c3aed;--VL:#ede9fe;
  --g0:#f8fafc;--g1:#f1f5f9;--g2:#e2e8f0;--g3:#cbd5e1;
  --g4:#94a3b8;--g5:#64748b;--g6:#475569;--g7:#334155;
  --g8:#1e293b;--g9:#0f172a;
  --sb:248px;--r:8px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--g0);color:var(--g8);min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.35)}50%{box-shadow:0 0 0 8px rgba(5,150,105,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}
#root{min-height:100vh}

/* ════════════════════════════════════════════════
   PROFILE / HOME
════════════════════════════════════════════════ */
.home{min-height:100vh;background:linear-gradient(135deg,var(--g9) 0%,#1e3a5f 60%,var(--g9) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
.home-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--P),var(--V));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;animation:pop .4s ease}
.home-title{font-size:30px;font-weight:700;color:white;margin-bottom:6px;text-align:center}
.home-sub{font-size:14px;color:var(--g4);margin-bottom:40px;text-align:center}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;width:100%;max-width:700px;margin-bottom:32px}
.prof-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.prof-card:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28);transform:translateY(-2px)}
.prof-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;font-weight:700;color:white}
.prof-name{font-size:14px;font-weight:600;color:white;word-break:break-word}
.prof-stats{font-size:11px;color:var(--g4);margin-top:4px}
.prof-del{position:absolute;top:8px;right:8px;background:rgba(220,38,38,.7);border:none;color:white;width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .15s}
.prof-card:hover .prof-del{display:flex}
.prof-del:hover{background:var(--D)}
.prof-add{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.2);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;color:var(--g4)}
.prof-add:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);color:white}
.prof-add-ico{font-size:28px;margin-bottom:8px}
.prof-add-lbl{font-size:13px;font-weight:500}

/* new profile form */
.new-prof-form{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:24px;width:100%;max-width:380px;animation:fadeIn .25s ease}
.new-prof-form h3{font-size:16px;font-weight:700;color:white;margin-bottom:18px}
.npi{width:100%;padding:10px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r);font-size:14px;font-family:inherit;color:white;margin-bottom:12px}
.npi::placeholder{color:var(--g5)}
.npi:focus{outline:none;border-color:var(--P);background:rgba(255,255,255,.15)}
.avatar-pick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.av-opt{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid transparent;transition:all .15s;font-weight:700;color:white}
.av-opt.sel{border-color:white;transform:scale(1.12)}
.home-admin-btn{font-size:13px;color:var(--g5);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:8px;font-family:inherit}
.home-admin-btn:hover{color:var(--g4)}

/* ════════════════════════════════════════════════
   LOGIN (admin)
════════════════════════════════════════════════ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--g9),#1e3a5f,var(--g9))}
.login-card{background:white;border-radius:16px;padding:44px;width:400px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:fadeIn .35s ease}
.login-logo{width:54px;height:54px;background:linear-gradient(135deg,var(--P),var(--V));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
.login-title{font-size:22px;font-weight:700;color:var(--g9);text-align:center}
.login-sub{font-size:13px;color:var(--g5);text-align:center;margin:4px 0 28px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--g7);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:10px 13px;border:2px solid var(--g2);border-radius:var(--r);font-size:14px;font-family:inherit;transition:border-color .2s;background:var(--g0);color:var(--g8)}
.fi:focus{outline:none;border-color:var(--P);background:white}
.fi.err{border-color:var(--D)}
.err-msg{font-size:12px;color:var(--D);margin-top:5px}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--P),var(--V));color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;transition:opacity .2s}
.btn-login:hover{opacity:.9}

/* ════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════ */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sb);background:var(--g9);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
.sb-head{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-ico{width:34px;height:34px;background:linear-gradient(135deg,var(--P),var(--V));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700;color:white}
.sb-ver{font-size:10px;color:var(--g5);font-family:'IBM Plex Mono',monospace}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--g5);padding:10px 10px 5px}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--g4);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.ni:hover{background:rgba(255,255,255,.07);color:white}
.ni.active{background:rgba(37,99,235,.25);color:#93c5fd}
.ni-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:12px;font-family:'IBM Plex Mono',monospace}
.nb-p{background:var(--P)}
.nb-g{background:var(--S)}
.nb-w{background:var(--W)}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.08)}
.prof-row{display:flex;align-items:center;gap:9px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:7px;margin-bottom:6px}
.prof-av-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.prof-n{font-size:12px;font-weight:600;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prof-r{font-size:10px;color:var(--g4)}
.btn-lo{margin-left:auto;background:none;border:none;color:var(--g5);cursor:pointer;font-size:14px;padding:3px;border-radius:4px;transition:color .15s;flex-shrink:0}
.btn-lo:hover{color:var(--D)}

/* ── MOBILE SIDEBAR TOGGLE ── */
.mob-bar{display:none;background:var(--g9);padding:10px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.mob-toggle{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

/* ════════════════════════════════════════════════
   MAIN CONTENT
════════════════════════════════════════════════ */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:white;border-bottom:1px solid var(--g2);padding:13px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.tb-title{font-size:17px;font-weight:700;color:var(--g9)}
.tb-sub{font-size:13px;color:var(--g5)}
.pg{padding:26px;flex:1;animation:fadeIn .3s ease}

/* ════════════════════════════════════════════════
   STAT CARDS
════════════════════════════════════════════════ */
.sc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.sc{background:white;border:1px solid var(--g2);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.sc-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.sc-val{font-size:24px;font-weight:700;color:var(--g9);line-height:1}
.sc-lbl{font-size:11px;color:var(--g5);margin-top:2px;font-weight:500}

/* ════════════════════════════════════════════════
   TABLE / TOOLBAR
════════════════════════════════════════════════ */
.tc{background:white;border:1px solid var(--g2);border-radius:12px;overflow:hidden}
.tb-bar{padding:12px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.sw{position:relative}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g4);font-size:13px;pointer-events:none}
.sinp{padding:7px 11px 7px 30px;border:1px solid var(--g2);border-radius:var(--r);font-size:13px;font-family:inherit;width:200px;background:var(--g0)}
.sinp:focus{outline:none;border-color:var(--P);background:white}
.fsel{padding:7px 11px;border:1px solid var(--g2);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--g0);color:var(--g7);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--P)}
.dt{width:100%;border-collapse:collapse}
.dt th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g5);background:var(--g0);border-bottom:1px solid var(--g2);white-space:nowrap}
.dt td{padding:9px 13px;font-size:13px;border-bottom:1px solid var(--g1);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:var(--g0)}
.qt{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--PL);color:#1d4ed8}
.b-green{background:var(--SL);color:#065f46}
.b-yellow{background:var(--WL);color:#92400e}
.b-red{background:var(--DL);color:#991b1b}
.b-gray{background:var(--g1);color:var(--g6)}
.b-purple{background:var(--VL);color:#5b21b6}
.ab{display:flex;gap:5px}
.ib{padding:4px 7px;border-radius:5px;border:1px solid var(--g2);background:white;cursor:pointer;font-size:11px;transition:all .15s;color:var(--g6)}
.ib:hover{background:var(--g1)}
.ib.d:hover{background:var(--DL);color:var(--D);border-color:#fca5a5}
.ib.p:hover{background:var(--PL);color:var(--P);border-color:#93c5fd}

/* ════════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.bp{background:var(--P);color:white}.bp:hover{background:var(--PD)}
.bs{background:var(--S);color:white}.bs:hover{background:#047857}
.bg{background:white;color:var(--g7);border:1px solid var(--g2)}.bg:hover{background:var(--g0)}
.bd{background:var(--D);color:white}.bd:hover{background:#b91c1c}
.bw{background:var(--W);color:white}.bw:hover{background:#b45309}
.bv{background:var(--V);color:white}.bv:hover{background:#6d28d9}
.btn-sm{padding:5px 10px;font-size:12px}

/* ════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .18s ease}
.ov-top{align-items:flex-start;padding-top:36px}
.mo{background:white;border-radius:14px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:fadeIn .22s ease}
.mo-wide{max-width:880px}
.mh{padding:17px 22px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.mt{font-size:15px;font-weight:700;color:var(--g9)}
.mc{width:28px;height:28px;border-radius:6px;border:1px solid var(--g2);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--g5);transition:all .15s}
.mc:hover{background:var(--g1)}
.mb{padding:20px 22px}
.mf{padding:13px 22px;border-top:1px solid var(--g2);display:flex;gap:9px;justify-content:flex-end;background:var(--g0);border-radius:0 0 14px 14px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.ff{grid-column:1/-1}
.mfi{width:100%;padding:8px 11px;border:1px solid var(--g3);border-radius:var(--r);font-size:13px;font-family:inherit;transition:border-color .2s;background:white;color:var(--g8)}
.mfi:focus{outline:none;border-color:var(--P);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.og{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.or{display:flex;align-items:center;gap:8px}
.ol{width:24px;height:24px;border-radius:5px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g6);flex-shrink:0}
.ol.ok{background:var(--S);color:white}

/* ════════════════════════════════════════════════
   PAGINATION
════════════════════════════════════════════════ */
.pag{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-top:1px solid var(--g2);background:var(--g0)}
.pag-inf{font-size:12px;color:var(--g5)}
.pag-btns{display:flex;gap:4px}
.pb{width:28px;height:28px;border-radius:5px;border:1px solid var(--g2);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;transition:all .15s}
.pb:hover:not(:disabled){background:var(--P);color:white;border-color:var(--P)}
.pb.cur{background:var(--P);color:white;border-color:var(--P)}
.pb:disabled{opacity:.38;cursor:default}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
.toast{position:fixed;bottom:20px;right:20px;background:var(--g9);color:white;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.28);display:flex;align-items:center;gap:9px;animation:fadeIn .25s ease;max-width:320px}
.toast.success{background:#064e3b;border-left:3px solid var(--S)}
.toast.error{background:#7f1d1d;border-left:3px solid var(--D)}
.toast.info{background:#1e3a5f;border-left:3px solid var(--P)}
.toast.warning{background:#78350f;border-left:3px solid var(--W)}

/* ════════════════════════════════════════════════
   EXAM MENU
════════════════════════════════════════════════ */
.menu-wrap{max-width:820px;margin:0 auto}
.sec{background:white;border:1px solid var(--g2);border-radius:12px;padding:20px;margin-bottom:16px}
.sec-title{font-size:14px;font-weight:700;color:var(--g8);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 14px;border:2px solid var(--g2);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--g6);transition:all .15s;font-family:inherit}
.chip:hover{border-color:var(--P);color:var(--P)}
.chip.active{background:var(--P);border-color:var(--P);color:white}

/* ════════════════════════════════════════════════
   EXAM
════════════════════════════════════════════════ */
.exam-wrap{max-width:800px;margin:0 auto;padding:24px 18px}
.exam-top{background:white;border-radius:12px;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.06);gap:14px;flex-wrap:wrap}
.prog-sec{flex:1;min-width:180px}
.prog-info{font-size:12px;color:var(--g6);margin-bottom:5px;font-weight:500;display:flex;gap:10px;align-items:center}
.prog-bar{height:7px;background:var(--g2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--S);border-radius:4px;transition:width .4s ease}
.timer-wrap{display:flex;align-items:center;gap:7px}
.timer-num{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;min-width:40px;text-align:center}
.timer-num.warn{color:var(--W)}
.timer-num.danger{color:var(--D);animation:blink 1s infinite}
.exam-card{background:white;border-radius:12px;padding:30px;box-shadow:0 2px 10px rgba(0,0,0,.06);animation:fadeIn .22s ease}
.q-num{font-size:11px;font-weight:700;color:var(--P);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.q-txt{font-size:19px;color:var(--g9);line-height:1.65;margin-bottom:24px;font-weight:600}
.ans-list{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.ans{padding:12px 14px;border:2px solid var(--g2);border-radius:10px;background:white;cursor:pointer;font-size:14px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:11px;transition:all .18s;color:var(--g7)}
.ans:not(.rev):hover{border-color:var(--P);background:var(--PL);color:var(--P)}
.ans.sel:not(.rev){border-color:var(--P);background:var(--P);color:white}
.ans.cor{border-color:var(--S)!important;background:var(--SL)!important;color:#065f46!important;animation:glow .6s ease}
.ans.wrg{border-color:var(--D)!important;background:var(--DL)!important;color:#991b1b!important;animation:shake .4s ease}
.ans.rev{cursor:not-allowed}
.ans-ltr{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.07);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ans-ico{margin-left:auto;font-size:15px}

/* ══════════════════════════════════════

══════════════════════════════════════ */
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t)},[]);
  return <div className={`toast ${type}`}><span>{type==='success'?'✓':type==='error'?'✕':type==='warning'?'⚠':'ℹ'}</span>{msg}</div>;
}

/* ══════════════════════════════════════
   TIMER RING
══════════════════════════════════════ */
function TimerRing({rem,total}){
  const pct=Math.max(0,rem/total),r=17,circ=2*Math.PI*r;
  const col=rem<=5?'#dc2626':rem<=10?'#d97706':'#059669';
  return(
    <svg width="42" height="42" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r={r} fill="none" stroke="#e2e8f0" strokeWidth="3.5"/>
      <circle cx="21" cy="21" r={r} fill="none" stroke={col} strokeWidth="3.5"
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dashoffset .9s linear,stroke .3s'}}/>
      <text x="21" y="25.5" textAnchor="middle" fontSize="10" fontWeight="700" fill={col} fontFamily="IBM Plex Mono">{rem}</text>
    </svg>
  );
}

/* ══════════════════════════════════════
   TIMER HOOK
══════════════════════════════════════ */
function useTimer(secs,onExp,active){
  const [rem,setRem]=useState(secs);
  const ref=useRef();
  useEffect(()=>setRem(secs),[secs]);
  useEffect(()=>{
    if(!active){clearInterval(ref.current);return;}
    clearInterval(ref.current);
    ref.current=setInterval(()=>setRem(r=>{if(r<=1){clearInterval(ref.current);onExp();return 0;}return r-1}),1000);
    return()=>clearInterval(ref.current);
  },[active]);
  const reset=useCallback(s=>{clearInterval(ref.current);setRem(s!==undefined?s:secs)},[secs]);
  const stop=useCallback(()=>clearInterval(ref.current),[]);
  return{rem,reset,stop};
}

══════════════════════════════════════ */
function QManager({questions,setQuestions,showToast}){
  const [search,setSearch]=useState('');
  const [catF,setCatF]=useState('');
  const [subF,setSubF]=useState('');
  const [diffF,setDiffF]=useState('');
  const [modal,setModal]=useState(null);
  const [delCfm,setDelCfm]=useState(null);
  const [page,setPage]=useState(1);
  const [pends,setPends]=useState(null);
  const PER=15;
  const impRef=useRef();
  const cats=[...new Set(questions.map(q=>q.category))].sort();
  const subs=catF?[...new Set(questions.filter(q=>q.category===catF).map(q=>q.subcategory))].sort()
                  :[...new Set(questions.map(q=>q.subcategory))].sort();

  const filtered=questions.filter(q=>{
    const s=search.toLowerCase();
    return(!s||q.text.toLowerCase().includes(s)||q.category.toLowerCase().includes(s)||q.subcategory.toLowerCase().includes(s))
      &&(!catF||q.category===catF)&&(!subF||q.subcategory===subF)&&(!diffF||q.difficulty===diffF);
  });
  const totalPg=Math.max(1,Math.ceil(filtered.length/PER));
  const paged=filtered.slice((page-1)*PER,page*PER);
  const rp=()=>setPage(1);

  useEffect(()=>setSubF(''),[catF]);

  const tryAdd=(incoming,current)=>{
    const exact=[],sim=[],fresh=[];
    incoming.forEach(q=>{
      if(current.find(e=>qExact(e,q)))exact.push(q);
      else if(current.find(e=>qSim(e,q)))sim.push({existing:current.find(e=>qSim(e,q)),incoming:q});
      else fresh.push(q);
    });
    return{exact,sim,fresh};
  };

  const saveQ=(form)=>{
    if(modal==='add'){
      const{exact,sim,fresh}=tryAdd([form],questions);
      if(exact.length){showToast('Bu soru zaten bankada mevcut!','error');return;}
      if(sim.length){setPends({items:sim,toAdd:fresh});setModal(null);return;}
      setQuestions(prev=>{const n=[...prev,{...form,id:uid()}];ss('exam_q',n);return n;});
      showToast('Soru eklendi ✓','success');
    }else{
      setQuestions(prev=>{const n=prev.map(q=>q.id===modal.id?{...form,id:modal.id}:q);ss('exam_q',n);return n;});
      showToast('Soru güncellendi ✓','success');
    }
    setModal(null);
  };

  const del=(id)=>{setQuestions(p=>{const n=p.filter(q=>q.id!==id);ss('exam_q',n);return n;});setDelCfm(null);showToast('Soru silindi','error')};
  const delAll=()=>{if(confirm(`Tüm ${questions.length} soru silinecek!`)){setQuestions([]);ss('exam_q',[]);showToast('Tüm sorular silindi','error')}};

  const expXls=()=>{
    const d=questions.map(q=>({'Soru Metni':q.text,'Kategori':q.category,'Alt Kategori':q.subcategory,'Zorluk':q.difficulty,'Seçenek A':q.options[0],'Seçenek B':q.options[1],'Seçenek C':q.options[2],'Seçenek D':q.options[3],'Doğru Cevap (0-3)':q.correctAnswer,'Açıklama':q.explanation}));
    const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Sorular');XLSX.writeFile(wb,`sorular_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast(`${questions.length} soru aktarıldı`,'success');
  };
  const expTpl=()=>{
    const d=[{'Soru Metni':'Örnek soru?','Kategori':'Matematik','Alt Kategori':'Geometri','Zorluk':'Orta','Seçenek A':'Cevap 1','Seçenek B':'Cevap 2','Seçenek C':'Cevap 3','Seçenek D':'Cevap 4','Doğru Cevap (0-3)':1,'Açıklama':'Açıklama metni'}];
    const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Şablon');XLSX.writeFile(wb,'soru_sablonu.xlsx');
    showToast('Şablon indirildi','info');
  };
  const expJson=()=>{
    const b=new Blob([JSON.stringify(questions,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='sorular.json';a.click();URL.revokeObjectURL(u);
    showToast('JSON aktarıldı','success');
  };
  const impFile=(file)=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        const inc=rows.map(row=>({id:uid(),text:row['Soru Metni']||'',category:row['Kategori']||'Diğer',subcategory:row['Alt Kategori']||'Genel',difficulty:row['Zorluk']||'Orta',options:[row['Seçenek A']||'',row['Seçenek B']||'',row['Seçenek C']||'',row['Seçenek D']||''],correctAnswer:parseInt(row['Doğru Cevap (0-3)'])||0,explanation:row['Açıklama']||''})).filter(q=>q.text&&q.options.every(o=>o));
        const{exact,sim,fresh}=tryAdd(inc,questions);
        if(fresh.length)setQuestions(p=>{const n=[...p,...fresh];ss('exam_q',n);return n;});
        showToast(`${fresh.length} eklendi · ${exact.length} aynı atlandı`+(sim.length?` · ${sim.length} bekliyor`:''),fresh.length?'success':'warning');
        if(sim.length)setPends({items:sim,toAdd:[]});
      }catch{showToast('Dosya okunamadı','error')}
    };
    r.readAsBinaryString(file);
    if(impRef.current)impRef.current.value='';
  };
  const resolveD=(dec)=>{
    if(!pends)return;
    setQuestions(prev=>{
      let n=[...prev];
      pends.items.forEach((it,i)=>{
        const d=dec[i];
        if(d==='replace')n=n.map(q=>q.id===it.existing.id?{...it.incoming,id:it.existing.id}:q);
        else if(d==='add')n=[...n,{...it.incoming,id:uid()}];
      });
      if(pends.toAdd?.length)n=[...n,...pends.toAdd.map(q=>({...q,id:uid()}))];
      ss('exam_q',n);return n;
    });
    showToast('Çakışmalar çözüldü ✓','success');setPends(null);
  };

  const byD=DIFFS.map(d=>({d,n:questions.filter(q=>q.difficulty===d).length}));

  return(
    <div>
      {/* Soru Ekle - büyük ve belirgin */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn bp" style={{fontSize:14,padding:'10px 20px'}} onClick={()=>setModal('add')}>➕ Yeni Soru Ekle</button>
          <button className="btn bs btn-sm" onClick={expXls}>📤 Excel</button>
          <label className="btn bg btn-sm" style={{cursor:'pointer'}}>📥 İçe Al<input ref={impRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&impFile(e.target.files[0])}/></label>
          <button className="btn bg btn-sm" onClick={expTpl}>📋 Şablon</button>
          <button className="btn bg btn-sm" onClick={expJson}>📄 JSON</button>
          <button className="btn bd btn-sm" onClick={delAll}>🗑 Tümü Sil</button>
        </div>
      </div>
      <div className="sc-grid">
        <div className="sc"><div className="sc-ico" style={{background:'#dbeafe'}}>📚</div><div><div className="sc-val">{questions.length}</div><div className="sc-lbl">Toplam Soru</div></div></div>
        <div className="sc"><div className="sc-ico" style={{background:'#ede9fe'}}>📂</div><div><div className="sc-val">{cats.length}</div><div className="sc-lbl">Kategori</div></div></div>
        {byD.map(({d,n})=><div className="sc" key={d}><div className="sc-ico" style={{background:d==='Kolay'?'#dcfce7':d==='Orta'?'#fef3c7':'#fee2e2'}}>{d==='Kolay'?'🟢':d==='Orta'?'🟡':'🔴'}</div><div><div className="sc-val">{n}</div><div className="sc-lbl">{d}</div></div></div>)}
      </div>
      <div className="tc">
        <div className="tb-bar">
          <div className="sw"><span className="si">🔍</span><input className="sinp" placeholder="Soru ara..." value={search} onChange={e=>{setSearch(e.target.value);rp()}}/></div>
          <select className="fsel" value={catF} onChange={e=>{setCatF(e.target.value);rp()}}>
            <option value="">Tüm Kategoriler</option>{cats.map(c=><option key={c}>{c}</option>)}
          </select>
          <select className="fsel" value={subF} onChange={e=>{setSubF(e.target.value);rp()}}>
            <option value="">Tüm Alt Kategoriler</option>{subs.map(s=><option key={s}>{s}</option>)}
          </select>
          <select className="fsel" value={diffF} onChange={e=>{setDiffF(e.target.value);rp()}}>
            <option value="">Tüm Zorluklar</option>{DIFFS.map(d=><option key={d}>{d}</option>)}
          </select>
        </div>
        {paged.length===0?<div className="empty"><div style={{fontSize:34,marginBottom:9}}>📭</div><div>{search||catF||subF||diffF?'Aramanıza uygun soru bulunamadı.':'Henüz soru eklenmemiş. Yukarıdaki "Yeni Soru Ekle" butonunu kullanın.'}</div></div>:(
          <div style={{overflowX:'auto'}}>
            <table className="dt">
              <thead><tr><th>#</th><th>Soru</th><th>Kategori</th><th>Alt Kat.</th><th>Zorluk</th><th>✓</th><th>İşlem</th></tr></thead>
              <tbody>
                {paged.map((q,i)=>(
                  <tr key={q.id}>
                    <td style={{color:'var(--g4)',fontFamily:'IBM Plex Mono',fontSize:10}}>{(page-1)*PER+i+1}</td>
                    <td><div className="qt" title={q.text}>{q.text}</div></td>
                    <td><span className="badge b-blue">{q.category}</span></td>
                    <td><span className="badge b-gray">{q.subcategory}</span></td>
                    <td><span className={`badge ${diffB(q.difficulty)}`}>{q.difficulty}</span></td>
                    <td><span style={{fontFamily:'IBM Plex Mono',fontWeight:700,color:'var(--S)',fontSize:12}}>{String.fromCharCode(65+q.correctAnswer)}</span></td>
                    <td><div className="ab"><button className="ib p" onClick={()=>setModal(q)}>✏️</button><button className="ib d" onClick={()=>setDelCfm(q)}>🗑</button></div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {totalPg>1&&(
          <div className="pag">
            <div className="pag-inf">{filtered.length} sonuç · {(page-1)*PER+1}–{Math.min(page*PER,filtered.length)}</div>
            <div className="pag-btns">
              <button className="pb" disabled={page===1} onClick={()=>setPage(p=>p-1)}>‹</button>
              {Array.from({length:Math.min(totalPg,7)},(_,i)=>{let p=i+1;if(totalPg>7){if(page<=4)p=i+1;else if(page>=totalPg-3)p=totalPg-6+i;else p=page-3+i;}return<button key={p} className={`pb${page===p?' cur':''}`} onClick={()=>setPage(p)}>{p}</button>})}
              <button className="pb" disabled={page===totalPg} onClick={()=>setPage(p=>p+1)}>›</button>
            </div>
          </div>
        )}
      </div>
      {(modal==='add'||(modal&&modal.id))&&<QModal q={modal==='add'?null:modal} allQuestions={questions} onSave={saveQ} onClose={()=>setModal(null)}/>}
      {delCfm&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setDelCfm(null)}>
          <div className="mo" style={{maxWidth:360}}>
            <div className="mh"><span className="mt">⚠️ Soru Sil</span><button className="mc" onClick={()=>setDelCfm(null)}>✕</button></div>
            <div className="mb"><p style={{color:'var(--g6)',fontSize:13}}>Silinecek:</p><p style={{marginTop:9,padding:10,background:'var(--g0)',borderRadius:7,fontSize:12}}>{delCfm.text}</p><p style={{marginTop:9,color:'var(--D)',fontSize:12}}>Bu işlem geri alınamaz.</p></div>
            <div className="mf"><button className="btn bg" onClick={()=>setDelCfm(null)}>İptal</button><button className="btn bd" onClick={()=>del(delCfm.id)}>Evet, Sil</button></div>
          </div>
        </div>
      )}
      {pends&&<DupModal items={pends.items} onResolve={resolveD} onClose={()=>setPends(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════
   CATEGORY MANAGER
══════════════════════════════════════ */
function CatManager({questions,setQuestions,showToast}){
  const [renaming,setRenaming]=useState(null);
  const [merging,setMerging]=useState(null);
  const [mergeTarget,setMergeTarget]=useState('');
  const [addCatOpen,setAddCatOpen]=useState(false);
  const [newCatName,setNewCatName]=useState('');
  const [newSubOpen,setNewSubOpen]=useState(null); // cat name
  const [newSubName,setNewSubName]=useState('');

  const cats=useMemo(()=>{
    const map={};
    questions.forEach(q=>{
      if(!map[q.category])map[q.category]={subs:{}};
      if(!map[q.category].subs[q.subcategory])map[q.category].subs[q.subcategory]=0;
      map[q.category].subs[q.subcategory]++;
    });
    return map;
  },[questions]);
  const catList=Object.keys(cats).sort();

  const addCategory=()=>{
    if(!newCatName.trim()){showToast('Kategori adı boş olamaz','error');return;}
    if(cats[newCatName.trim()]){showToast('Bu kategori zaten mevcut','warning');return;}
    // Boş bir placeholder soru eklemiyoruz; sadece soru eklerken bu kategori seçilebilir
    // Ama kullanıcı "boş kategori" görmek istiyorsa bir sistem sorusu eklemek gerekir.
    // Burada sadece bilgi veriyoruz ve soru eklemelerini yönlendiriyoruz.
    showToast(`"${newCatName.trim()}" kategorisi oluşturuldu. Şimdi bu kategoriye soru ekleyin.`,'info');
    // Gerçek oluşturma: dummy hidden soru ekleyip gizlemek yerine,
    // kategoriler sorulardan türetiliyor — bu yüzden gerçek boş kategori için
    // soru ekleme modalını açıyoruz:
    setAddCatOpen(false);setNewCatName('');
  };

  const addSubcategory=(cat)=>{
    if(!newSubName.trim()){showToast('Alt kategori adı boş olamaz','error');return;}
    showToast(`"${newSubName.trim()}" alt kategorisi bilgisi kaydedildi. Yeni soru eklerken bu alt kategoriyi kullanabilirsiniz.`,'info');
    setNewSubOpen(null);setNewSubName('');
  };

  const renameCat=(oldCat,newCat)=>{
    if(!newCat.trim()||newCat===oldCat)return;
    if(cats[newCat]){showToast(`"${newCat}" zaten mevcut`,'warning');return;}
    setQuestions(qs=>{const n=qs.map(q=>q.category===oldCat?{...q,category:newCat}:q);ss('exam_q',n);return n;});
    showToast(`"${oldCat}" → "${newCat}"`,'success');setRenaming(null);
  };
  const renameSub=(cat,oldSub,newSub)=>{
    if(!newSub.trim()||newSub===oldSub)return;
    setQuestions(qs=>{const n=qs.map(q=>q.category===cat&&q.subcategory===oldSub?{...q,subcategory:newSub}:q);ss('exam_q',n);return n;});
    showToast('Alt kategori yeniden adlandırıldı','success');setRenaming(null);
  };
  const deleteCat=(cat)=>{
    const cnt=questions.filter(q=>q.category===cat).length;
    if(!confirm(`"${cat}" ve içindeki ${cnt} soru silinecek. Emin misiniz?`))return;
    setQuestions(qs=>{const n=qs.filter(q=>q.category!==cat);ss('exam_q',n);return n;});
    showToast(`"${cat}" silindi`,'error');
  };
  const deleteSub=(cat,sub)=>{
    const cnt=questions.filter(q=>q.category===cat&&q.subcategory===sub).length;
    if(!confirm(`"${sub}" ve içindeki ${cnt} soru silinecek. Emin misiniz?`))return;
    setQuestions(qs=>{const n=qs.filter(q=>!(q.category===cat&&q.subcategory===sub));ss('exam_q',n);return n;});
    showToast(`"${sub}" silindi`,'error');
  };
  const mergeCats=(from,to)=>{
    setQuestions(qs=>{const n=qs.map(q=>q.category===from?{...q,category:to}:q);ss('exam_q',n);return n;});
    showToast(`"${from}" → "${to}" ile birleştirildi`,'success');setMerging(null);setMergeTarget('');
  };
  const mergeSubs=(cat,from,to)=>{
    setQuestions(qs=>{const n=qs.map(q=>q.category===cat&&q.subcategory===from?{...q,subcategory:to}:q);ss('exam_q',n);return n;});
    showToast('Alt kategoriler birleştirildi','success');setMerging(null);setMergeTarget('');
  };

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:10}}>
        <p style={{fontSize:13,color:'var(--g5)'}}>Kategorileri yeniden adlandır, birleştir veya sil. Kategori eklemek için ➕ Yeni Kategori butonunu kullanın.</p>
        <button className="btn bp btn-sm" onClick={()=>setAddCatOpen(true)}>➕ Yeni Kategori</button>
      </div>

      {addCatOpen&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setAddCatOpen(false)}>
          <div className="mo" style={{maxWidth:380}}>
            <div className="mh"><span className="mt">➕ Yeni Kategori Ekle</span><button className="mc" onClick={()=>setAddCatOpen(false)}>✕</button></div>
            <div className="mb">
              <p style={{fontSize:13,color:'var(--g5)',marginBottom:14}}>Kategoriler sorulardan otomatik türetilir. Yeni bir kategori adı girin; ardından o kategoriye soru ekleyerek aktif hale getirin.</p>
              <div className="fl" style={{fontSize:11,fontWeight:700,color:'var(--g6)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:5}}>Kategori Adı</div>
              <input className="mfi" value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="ör: Tarih" autoFocus onKeyDown={e=>e.key==='Enter'&&addCategory()}/>
            </div>
            <div className="mf"><button className="btn bg" onClick={()=>setAddCatOpen(false)}>İptal</button><button className="btn bp" onClick={addCategory}>✓ Onayla</button></div>
          </div>
        </div>
      )}

      {newSubOpen&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setNewSubOpen(null)}>
          <div className="mo" style={{maxWidth:380}}>
            <div className="mh"><span className="mt">➕ Yeni Alt Kategori — {newSubOpen}</span><button className="mc" onClick={()=>setNewSubOpen(null)}>✕</button></div>
            <div className="mb">
              <div className="fl" style={{fontSize:11,fontWeight:700,color:'var(--g6)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:5}}>Alt Kategori Adı</div>
              <input className="mfi" value={newSubName} onChange={e=>setNewSubName(e.target.value)} placeholder="ör: Osmanlı Tarihi" autoFocus onKeyDown={e=>e.key==='Enter'&&addSubcategory(newSubOpen)}/>
            </div>
            <div className="mf"><button className="btn bg" onClick={()=>setNewSubOpen(null)}>İptal</button><button className="btn bp" onClick={()=>addSubcategory(newSubOpen)}>✓ Onayla</button></div>
          </div>
        </div>
      )}

      <div className="cat-grid">
        {catList.map(cat=>{
          const subs=Object.keys(cats[cat].subs).sort();
          const total=questions.filter(q=>q.category===cat).length;
          return(
            <div className="cat-card" key={cat}>
              <div className="cat-head">
                <div style={{flex:1}}>
                  {renaming?.type==='cat'&&renaming.cat===cat?(
                    <div style={{display:'flex',gap:5,alignItems:'center'}}>
                      <input className="mfi" style={{padding:'4px 8px',fontSize:12,width:120}} value={renaming.val} autoFocus
                        onChange={e=>setRenaming(r=>({...r,val:e.target.value}))}
                        onKeyDown={e=>{if(e.key==='Enter')renameCat(cat,renaming.val);if(e.key==='Escape')setRenaming(null)}}/>
                      <button className="btn btn-sm bs" onClick={()=>renameCat(cat,renaming.val)}>✓</button>
                      <button className="btn btn-sm bg" onClick={()=>setRenaming(null)}>✕</button>
                    </div>
                  ):(
                    <><div className="cat-name">{cat}</div><div className="cat-count">{total} soru · {subs.length} alt kat.</div></>
                  )}
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button className="ib p" title="Yeniden Adlandır" onClick={()=>setRenaming({type:'cat',cat,val:cat})}>✏️</button>
                  <button className="ib p" title="Birleştir" onClick={()=>{setMerging({type:'cat',from:cat});setMergeTarget('')}}>⊕</button>
                  <button className="ib d" title="Sil" onClick={()=>deleteCat(cat)}>🗑</button>
                </div>
              </div>
              <div className="cat-body">
                {subs.map(sub=>{
                  const cnt=cats[cat].subs[sub];
                  return(
                    <div className="sub-row" key={sub}>
                      {renaming?.type==='sub'&&renaming.cat===cat&&renaming.sub===sub?(
                        <div style={{display:'flex',gap:5,alignItems:'center',flex:1}}>
                          <input className="mfi" style={{padding:'3px 7px',fontSize:11,flex:1}} value={renaming.val} autoFocus
                            onChange={e=>setRenaming(r=>({...r,val:e.target.value}))}
                            onKeyDown={e=>{if(e.key==='Enter')renameSub(cat,sub,renaming.val);if(e.key==='Escape')setRenaming(null)}}/>
                          <button className="btn btn-sm bs" onClick={()=>renameSub(cat,sub,renaming.val)}>✓</button>
                          <button className="btn btn-sm bg" onClick={()=>setRenaming(null)}>✕</button>
                        </div>
                      ):(
                        <>
                          <span className="sub-name">└ {sub}</span>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <span className="sub-cnt">{cnt}</span>
                            <div style={{display:'flex',gap:3}}>
                              <button className="ib p" style={{padding:'2px 5px',fontSize:10}} onClick={()=>setRenaming({type:'sub',cat,sub,val:sub})}>✏️</button>
                              <button className="ib p" style={{padding:'2px 5px',fontSize:10}} onClick={()=>{setMerging({type:'sub',from:sub,cat});setMergeTarget('')}}>⊕</button>
                              <button className="ib d" style={{padding:'2px 5px',fontSize:10}} onClick={()=>deleteSub(cat,sub)}>🗑</button>
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
                <button className="btn bg btn-sm" style={{width:'100%',marginTop:8,fontSize:11,justifyContent:'center'}} onClick={()=>{setNewSubOpen(cat);setNewSubName('')}}>+ Alt Kategori Ekle</button>
              </div>
            </div>
          );
        })}
        {catList.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><div style={{fontSize:34,marginBottom:9}}>📂</div><div>Henüz kategori yok. Soru ekleyerek kategori oluşturun.</div></div>}
      </div>

      {merging&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setMerging(null)}>
          <div className="mo" style={{maxWidth:400}}>
            <div className="mh"><span className="mt">⊕ Birleştir</span><button className="mc" onClick={()=>setMerging(null)}>✕</button></div>
            <div className="mb">
              <p style={{fontSize:13,color:'var(--g6)',marginBottom:13}}>{merging.type==='cat'?`"${merging.from}" kategorisini hangi kategoriyle birleştirmek istiyorsunuz?`:`"${merging.from}" alt kategorisini hangi alt kategoriyle birleştirmek istiyorsunuz?`}</p>
              <div className="fl" style={{fontSize:11,fontWeight:700,color:'var(--g6)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:5}}>Hedef</div>
              <select className="mfi" value={mergeTarget} onChange={e=>setMergeTarget(e.target.value)}>
                <option value="">— Seçin —</option>
                {merging.type==='cat'?Object.keys(cats).filter(c=>c!==merging.from).sort().map(c=><option key={c}>{c}</option>):Object.keys(cats[merging.cat]?.subs||{}).filter(s=>s!==merging.from).sort().map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="mf"><button className="btn bg" onClick={()=>setMerging(null)}>İptal</button><button className="btn bw" style={{opacity:mergeTarget?1:.45}} onClick={()=>{if(!mergeTarget)return;merging.type==='cat'?mergeCats(merging.from,mergeTarget):mergeSubs(merging.cat,merging.from,mergeTarget)}}>⊕ Birleştir</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   HISTORY
══════════════════════════════════════ */
function History({history,setHistory,profileId}){
  const mine=history.filter(h=>h.profileId===profileId);
  const pct=s=>Math.round((s.correct/s.total)*100);
  if(!mine.length)return(
    <div>
      <div className="topbar"><div><div className="tb-title">📊 Sınav Geçmişi</div><div className="tb-sub">Kişisel istatistikler</div></div></div>
      <div className="pg"><div className="empty"><div style={{fontSize:36,marginBottom:9}}>📭</div><div>Henüz tamamlanan sınav yok.</div></div></div>
    </div>
  );
  const clear=()=>{if(confirm('Bu profile ait geçmiş silinsin mi?')){const n=history.filter(h=>h.profileId!==profileId);setHistory(n);ss('exam_hist',n)}};
  const avgPct=Math.round(mine.reduce((a,s)=>a+pct(s),0)/mine.length);
  const totalCorrect=mine.reduce((a,s)=>a+s.correct,0);
  const totalQ=mine.reduce((a,s)=>a+s.total,0);
  return(
    <div>
      <div className="topbar"><div><div className="tb-title">📊 Sınav Geçmişi</div><div className="tb-sub">{mine.length} sınav tamamlandı</div></div><button className="btn bd btn-sm" style={{marginLeft:'auto'}} onClick={clear}>🗑 Temizle</button></div>
      <div className="pg">
        <div className="pstat-grid">
          <div className="pstat"><div className="pstat-num" style={{color:'var(--P)'}}>{mine.length}</div><div className="pstat-lbl">Toplam Sınav</div></div>
          <div className="pstat"><div className="pstat-num" style={{color:'var(--S)'}}>{totalCorrect}</div><div className="pstat-lbl">Toplam Doğru</div></div>
          <div className="pstat"><div className="pstat-num" style={{color:'var(--W)'}}>{totalQ}</div><div className="pstat-lbl">Toplam Soru</div></div>
          <div className="pstat"><div className="pstat-num" style={{color:avgPct>=70?'var(--S)':avgPct>=50?'var(--W)':'var(--D)'}}>{avgPct}%</div><div className="pstat-lbl">Ortalama Başarı</div></div>
        </div>
        <div className="tc">
          {mine.slice().reverse().map((s,i)=>(
            <div className="hist-row" key={i}>
              <div className="hist-date">{fmtDate(s.date)}</div>
              <div className="hist-cat">
                {s.category&&<span className="badge b-blue" style={{marginRight:5}}>{s.category}</span>}
                {s.difficulty&&<span className={`badge ${diffB(s.difficulty)}`} style={{marginRight:5}}>{s.difficulty}</span>}
                <span style={{fontSize:11,color:'var(--g5)'}}>{s.total} soru</span>
              </div>
              <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:12,color:'var(--S)',fontWeight:600}}>✓ {s.correct}</span>
                <span style={{fontSize:12,color:'var(--D)',fontWeight:600}}>✗ {s.wrong}</span>
                <span style={{fontSize:12,color:'var(--W)',fontWeight:600}}>— {s.empty}</span>
              </div>
              <div className="hist-pct" style={{color:pct(s)>=70?'var(--S)':pct(s)>=50?'var(--W)':'var(--D)'}}>{pct(s)}%</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   EXAM MENU
══════════════════════════════════════ */
function ExamMenu({questions,onStart,timerSecs}){
  const [cat,setCat]=useState(null);const [sub,setSub]=useState(null);const [diff,setDiff]=useState(null);const [count,setCount]=useState(null);
  const cats=[...new Set(questions.map(q=>q.category))];
  const subs=cat?[...new Set(questions.filter(q=>q.category===cat).map(q=>q.subcategory))]:[];
  const diffs=[...new Set(questions.map(q=>q.difficulty))];
  const filtered=questions.filter(q=>(!cat||q.category===cat)&&(!sub||q.subcategory===sub)&&(!diff||q.difficulty===diff));
  const canStart=count&&filtered.length>0;
  return(
    <div className="menu-wrap">
      <div className="topbar"><div><div className="tb-title">🚀 Sınava Başla</div><div className="tb-sub">{filtered.length} uygun soru · ⏱ {timerSecs}sn/soru</div></div></div>
      <div className="pg">
        <div className="sec"><div className="sec-title">📂 1. Kategori <span style={{color:'var(--g4)',fontWeight:400,fontSize:12}}>(opsiyonel)</span></div><div className="chips">{cats.map(c=><button key={c} className={`chip${cat===c?' active':''}`} onClick={()=>{setCat(cat===c?null:c);setSub(null)}}>{c}</button>)}</div></div>
        {cat&&subs.length>1&&<div className="sec"><div className="sec-title">📁 2. Alt Kategori <span style={{color:'var(--g4)',fontWeight:400,fontSize:12}}>(opsiyonel)</span></div><div className="chips">{subs.map(s=><button key={s} className={`chip${sub===s?' active':''}`} onClick={()=>setSub(sub===s?null:s)}>{s}</button>)}</div></div>}
        <div className="sec"><div className="sec-title">🎯 3. Zorluk <span style={{color:'var(--g4)',fontWeight:400,fontSize:12}}>(opsiyonel)</span></div><div className="chips">{diffs.map(d=><button key={d} className={`chip${diff===d?' active':''}`} onClick={()=>setDiff(diff===d?null:d)}>{d}</button>)}</div></div>
        <div className="sec">
          <div className="sec-title">🔢 4. Soru Sayısı *</div>
          <div className="chips">
            {[10,20,50,100].filter(n=>filtered.length>=n).map(n=><button key={n} className={`chip${count===n?' active':''}`} onClick={()=>setCount(count===n?null:n)}>{n}</button>)}
            <button className={`chip${count==='all'?' active':''}`} onClick={()=>setCount(count==='all'?null:'all')}>Tümü ({filtered.length})</button>
          </div>
        </div>
        <div style={{textAlign:'center'}}><button className="btn bp" style={{padding:'12px 36px',fontSize:14,opacity:canStart?1:.45}} onClick={()=>{if(!canStart)return;let qs=[...filtered];if(count!=='all')qs=qs.slice(0,count);onStart(qs,{cat,diff})}}>🚀 Sınavı Başlat</button></div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   EXAM PAGE
══════════════════════════════════════ */
function ExamPage({examQs,timerSecs,shuffleOpts,onFinish,onExit}){
  const [cur,setCur]=useState(0);
  const [answers,setAnswers]=useState({});
  const [revealed,setRevealed]=useState(false);
  const [feedback,setFeedback]=useState(null);
  const [timerActive,setTimerActive]=useState(true); // direkt başla
  const [showFinCfm,setShowFinCfm]=useState(false);
  const pendRef=useRef();

  const shuffledOpts=useMemo(()=>{
    if(!shuffleOpts)return examQs.map(q=>({opts:q.options,map:[0,1,2,3]}));
    return examQs.map(q=>{const idx=[0,1,2,3];const s=shuffle(idx);return{opts:s.map(i=>q.options[i]),map:s}});
  },[examQs,shuffleOpts]);

  const q=examQs[cur];
  const{opts,map}=shuffledOpts[cur];
  const correctMapped=map.indexOf(q.correctAnswer);

  const doFinish=useCallback((ans)=>{
    clearTimeout(pendRef.current);
    setTimerActive(false);
    const mapped={};
    Object.keys(ans).forEach(ci=>{
      const qi=parseInt(ci);const a=ans[qi];
      if(a===null||a===undefined)mapped[qi]=a;
      else mapped[qi]=shuffledOpts[qi].map[a];
    });
    onFinish(mapped);
  },[shuffledOpts,onFinish]);

  const goNext=useCallback((ansSnap)=>{
    setRevealed(false);setFeedback(null);setTimerActive(false);
    clearTimeout(pendRef.current);
    if(cur<examQs.length-1){setCur(c=>c+1);setTimeout(()=>setTimerActive(true),50);}
    else doFinish(ansSnap||answers);
  },[cur,examQs.length,answers,doFinish]);

  const handleExpire=useCallback(()=>{
    setTimerActive(false);setRevealed(true);setFeedback('tmt');
    setAnswers(p=>{const n={...p};if(n[cur]===undefined)n[cur]=null;return n;});
    pendRef.current=setTimeout(()=>goNext(),2200);
  },[cur,goNext]);

  const{rem,reset,stop}=useTimer(timerSecs,handleExpire,timerActive);

  // Soru değişince timer anında başlar
  useEffect(()=>{
    setRevealed(false);setFeedback(null);
    reset(timerSecs);
    setTimerActive(true);
    return()=>clearTimeout(pendRef.current);
  },[cur]);

  const handleAns=(i)=>{
    if(revealed||showFinCfm)return;
    stop();setTimerActive(false);
    const newA={...answers,[cur]:i};setAnswers(newA);setRevealed(true);
    const ok=i===correctMapped;setFeedback(ok?'cor':'wrg');
    pendRef.current=setTimeout(()=>goNext(newA),ok?1000:2200);
  };

  useEffect(()=>{
    const fn=e=>{
      if(revealed||showFinCfm)return;
      if(e.key==='a'||e.key==='A')handleAns(0);
      else if(e.key==='b'||e.key==='B')handleAns(1);
      else if(e.key==='c'||e.key==='C')handleAns(2);
      else if(e.key==='d'||e.key==='D')handleAns(3);
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[revealed,cur,showFinCfm]);

  const btnCls=(i)=>{
    if(!revealed)return answers[cur]===i?'sel':'';
    if(i===correctMapped)return'cor rev';
    if(answers[cur]===i&&i!==correctMapped)return'wrg rev';
    return'rev';
  };
  const timerCls=rem<=5?'danger':rem<=10?'warn':'';
  const answered=Object.keys(answers).length;

  return(
    <div className="exam-wrap">
      <div className="exam-top">
        <div className="prog-sec">
          <div className="prog-info">
            <span>Soru {cur+1} / {examQs.length}</span>
            <span style={{color:'var(--S)'}}>✓ {answered}</span>
          </div>
          <div className="prog-bar"><div className="prog-fill" style={{width:`${((cur+1)/examQs.length)*100}%`}}/></div>
        </div>
        <div className="timer-wrap">
          <TimerRing rem={rem} total={timerSecs}/>
          <div className={`timer-num ${timerCls}`}>{rem}s</div>
        </div>
        <div style={{display:'flex',gap:7}}>
          <button className="btn bw btn-sm" onClick={()=>setShowFinCfm(true)}>⏹ Bitir</button>
          <button className="btn bg btn-sm" onClick={()=>{if(confirm('Sınavdan çıkmak istiyor musunuz?')){clearTimeout(pendRef.current);onExit()}}}>✕</button>
        </div>
      </div>
      <div className="exam-card">
        <div className="q-num">Soru {cur+1} · {q.category} · {q.difficulty}</div>
        <div className="q-txt">{q.text}</div>
        {feedback&&(
          <div className={`fbk ${feedback}`}>
            {feedback==='cor'&&<><span>✅</span>Doğru! Bir sonraki soruya geçiliyor…</>}
            {feedback==='wrg'&&<><span>❌</span>Yanlış! Doğru: <strong>{String.fromCharCode(65+map.indexOf(q.correctAnswer))}) {q.options[q.correctAnswer]}</strong></>}
            {feedback==='tmt'&&<><span>⏱</span>Süre doldu! Doğru: <strong>{String.fromCharCode(65+map.indexOf(q.correctAnswer))}) {q.options[q.correctAnswer]}</strong></>}
          </div>
        )}
        <div className="ans-list">
          {opts.map((opt,i)=>(
            <button key={i} className={`ans ${btnCls(i)}`} onClick={()=>handleAns(i)}>
              <div className="ans-ltr">{String.fromCharCode(65+i)}</div>
              <span style={{flex:1}}>{opt}</span>
              {revealed&&i===correctMapped&&<span className="ans-ico">✅</span>}
              {revealed&&answers[cur]===i&&i!==correctMapped&&<span className="ans-ico">❌</span>}
            </button>
          ))}
        </div>
        <div className="kbd"><span className="kk"><kbd className="kkey">A</kbd><kbd className="kkey">B</kbd><kbd className="kkey">C</kbd><kbd className="kkey">D</kbd> ile cevapla</span></div>
      </div>
      {showFinCfm&&(
        <div className="ov">
          <div className="mo" style={{maxWidth:400}}>
            <div className="mh"><span className="mt">⏹ Sınavı Bitir</span><button className="mc" onClick={()=>setShowFinCfm(false)}>✕</button></div>
            <div className="mb">
              <p style={{color:'var(--g7)',lineHeight:1.7,fontSize:14}}><strong>{answered}</strong> / {examQs.length} soru cevaplandı.<br/><span style={{color:'var(--W)'}}>{examQs.length-answered} soru boş kalacak.</span><br/><br/>Sonuçlarınızı şimdi görmek istiyor musunuz?</p>
            </div>
            <div className="mf">
              <button className="btn bg" onClick={()=>setShowFinCfm(false)}>Devam Et</button>
              <button className="btn bw" onClick={()=>{setShowFinCfm(false);clearTimeout(pendRef.current);doFinish(answers)}}>⏹ Evet, Bitir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   RESULTS
══════════════════════════════════════ */
function Results({examQs,answers,meta,profileId,onBack,addHistory}){
  useEffect(()=>{
    let correct=0,wrong=0,empty=0;
    examQs.forEach((q,i)=>{const a=answers[i];if(a===null||a===undefined)empty++;else if(a===q.correctAnswer)correct++;else wrong++;});
    addHistory({date:Date.now(),correct,wrong,empty,total:examQs.length,category:meta?.cat,difficulty:meta?.diff,profileId});
  },[]);
  let correct=0,wrongList=[],emptyList=[];
  examQs.forEach((q,i)=>{const a=answers[i];if(a===null||a===undefined)emptyList.push(q);else if(a===q.correctAnswer)correct++;else wrongList.push({q,user:q.options[a],correct:q.options[q.correctAnswer]})});
  const pct=Math.round((correct/examQs.length)*100);
  return(
    <div className="res-wrap">
      <div style={{textAlign:'center',paddingTop:12}}>
        <h1 style={{fontSize:30,fontWeight:800,color:'var(--g9)'}}>✓ Sınav Tamamlandı</h1>
        <div className="score-grid">
          <div className="sbox"><div className="snum" style={{color:'var(--S)'}}>{correct}</div><div className="slbl">Doğru</div></div>
          <div className="sbox"><div className="snum" style={{color:'var(--D)'}}>{wrongList.length}</div><div className="slbl">Yanlış</div></div>
          <div className="sbox"><div className="snum" style={{color:'var(--W)'}}>{emptyList.length}</div><div className="slbl">Boş</div></div>
          <div className="sbox"><div className="snum" style={{color:'var(--P)'}}>{pct}%</div><div className="slbl">Başarı</div></div>
        </div>
      </div>
      {wrongList.length>0&&<div className="sec" style={{marginTop:18}}><div className="sec-title">❌ Yanlış Cevaplar</div>{wrongList.map((w,i)=><div key={i} style={{padding:12,background:'var(--DL)',borderLeft:'4px solid var(--D)',borderRadius:8,marginBottom:9}}><p style={{fontWeight:600,marginBottom:7,fontSize:14}}>{w.q.text}</p><p style={{fontSize:12,color:'var(--D)'}}>Cevabınız: {w.user}</p><p style={{fontSize:12,color:'var(--S)',fontWeight:600}}>Doğru: {w.correct}</p>{w.q.explanation&&<p style={{fontSize:11,marginTop:6,color:'var(--g6)',background:'rgba(0,0,0,.04)',padding:'6px 9px',borderRadius:5}}>💡 {w.q.explanation}</p>}</div>)}</div>}
      {emptyList.length>0&&<div className="sec"><div className="sec-title">⏱ Boş Bırakılan</div>{emptyList.map((q,i)=><div key={i} style={{padding:'9px 13px',background:'var(--WL)',borderLeft:'4px solid var(--W)',borderRadius:7,marginBottom:7,fontSize:12}}><span style={{fontWeight:600}}>{q.text}</span><span style={{marginLeft:8,color:'var(--g6)'}}>Doğru: {q.options[q.correctAnswer]}</span></div>)}</div>}
      <div style={{textAlign:'center',marginTop:18}}><button className="btn bp" style={{padding:'11px 30px'}} onClick={onBack}>🏠 Ana Menüye Dön</button></div>
    </div>
  );
}

function ProfileHome({profiles,setProfiles,onSelectProfile,onAdminLogin}){
  const [adding,setAdding]=useState(false);

  const [color,setColor]=useState(AVATAR_COLORS[0]);
  const [emoji,setEmoji]=useState(AVATAR_EMOJIS[0]);

  const createProfile=()=>{
    if(!name.trim())return;
    const p={id:uid(),name:name.trim(),color,emoji,createdAt:Date.now()};
    const next=[...profiles,p];setProfiles(next);ss('exam_profiles',next);
    setAdding(false);setName('');
    onSelectProfile(p);
  };

  const deleteProfile=(id,e)=>{
    e.stopPropagation();
    if(!confirm('Bu profil ve istatistikleri silinecek. Emin misiniz?'))return;
    const next=profiles.filter(p=>p.id!==id);setProfiles(next);ss('exam_profiles',next);

    <div className="home">

            <button className="prof-del" onClick={e=>deleteProfile(p.id,e)}>✕</button>
            <div className="prof-avatar" style={{background:p.color}}>{p.emoji}</div>
            <div className="prof-name">{p.name}</div>
          </div>
        ))}
        {!adding&&(
          <div className="prof-add" onClick={()=>setAdding(true)}>
            <div className="prof-add-ico">➕</div>
            <div className="prof-add-lbl">Yeni Profil</div>
          </div>
        )}
      </div>
      {adding&&(
        <div className="new-prof-form">
          <h3>Yeni Profil Oluştur</h3>
          <input className="npi" value={name} onChange={e=>setName(e.target.value)} placeholder="Adınız..." autoFocus onKeyDown={e=>e.key==='Enter'&&createProfile()}/>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>Renk Seç</div>
          <div className="avatar-pick" style={{marginBottom:12}}>
            {AVATAR_COLORS.map(c=>(
              <div key={c} className={`av-opt${color===c?' sel':''}`} style={{background:c}} onClick={()=>setColor(c)}>•</div>
            ))}
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>İkon Seç</div>
          <div className="avatar-pick">
            {AVATAR_EMOJIS.map(em=>(
              <div key={em} className={`av-opt${emoji===em?' sel':''}`} style={{background:'rgba(255,255,255,.1)'}} onClick={()=>setEmoji(em)}>{em}</div>
            ))}
          </div>
          <div style={{display:'flex',gap:9,marginTop:8}}>
            <button className="btn bg" style={{flex:1}} onClick={()=>setAdding(false)}>İptal</button>
            <button className="btn bp" style={{flex:2,opacity:name.trim()?1:.45}} onClick={createProfile}>✓ Oluştur</button>
          </div>
        </div>
      )}
      <button className="home-admin-btn" onClick={onAdminLogin}>⚙️ Yönetici Girişi</button>
    </div>
  );
}

   ADMIN LOGIN
══════════════════════════════════════ */
function AdminLogin({onLogin,onBack}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');
  const go=()=>{const r=chkAuth(u.trim(),p);if(r)onLogin(r);else setErr('Kullanıcı adı veya şifre hatalı.')};
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">🔐</div>
        <div className="login-title">Yönetici Girişi</div>
        <div className="login-sub">Soru bankasını yönetmek için giriş yapın</div>
        <div className="fg"><label className="fl">Kullanıcı Adı</label><input className={`fi${err?' err':''}`} value={u} onChange={e=>{setU(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&go()} autoFocus/></div>
        <div className="fg"><label className="fl">Şifre</label><input className={`fi${err?' err':''}`} type="password" value={p} onChange={e=>{setP(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {err&&<div className="err-msg">⚠ {err}</div>}
        <button className="btn-login" onClick={go}>Giriş Yap →</button>
        <button onClick={onBack} style={{width:'100%',marginTop:12,background:'none',border:'none',color:'var(--g5)',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>← Geri</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP
══════════════════════════════════════ */
function App(){
  // Profiles
  const [profiles,setProfiles]=useState(()=>gs('exam_profiles',[]));
  const [activeProfile,setActiveProfile]=useState(null);
  // Admin
  const [adminUser,setAdminUser]=useState(()=>gs('exam_admin_user',null));
  const [showAdminLogin,setShowAdminLogin]=useState(false);
  // Data
  const [questions,setQuestions]=useState(()=>gs('exam_q',DQ));
  const [timerSecs,setTimerSecs]=useState(()=>gs('exam_timer',DTIMER));
  const [shuffleQ,setShuffleQ]=useState(()=>gs('exam_shuffleQ',false));
  const [shuffleOpts,setShuffleOpts]=useState(()=>gs('exam_shuffleOpts',false));
  const [history,setHistory]=useState(()=>gs('exam_hist',[]));
  // UI
  const [page,setPage]=useState('menu');
  const [examQs,setExamQs]=useState([]);
  const [examMeta,setExamMeta]=useState(null);
  const [examAnswers,setExamAnswers]=useState({});
  const [toast,setToast]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  const showToast=(msg,type='info')=>setToast({msg,type,key:Date.now()});
  const addHistory=(rec)=>{setHistory(h=>{const n=[...h,rec];ss('exam_hist',n);return n})};

  const startExam=(qs,meta)=>{
    const final=shuffleQ?shuffle(qs):qs;
    setExamQs(final);setExamMeta(meta);setPage('exam');
  };

  const logout=()=>{setAdminUser(null);ss('exam_admin_user',null);setPage('menu')};

  const closeSidebar=()=>setSidebarOpen(false);

  // If no active profile and no admin → show profile home
  if(!activeProfile&&!adminUser){
    if(showAdminLogin)return<AdminLogin onLogin={u=>{setAdminUser(u);ss('exam_admin_user',u);setShowAdminLogin(false)}} onBack={()=>setShowAdminLogin(false)}/>;
    return<ProfileHome profiles={profiles} setProfiles={setProfiles} onSelectProfile={p=>{setActiveProfile(p);setPage('menu')}} onAdminLogin={()=>setShowAdminLogin(true)}/>;
  }

  if(page==='exam')return(
    <div style={{background:'var(--g0)',minHeight:'100vh'}}>
      <ExamPage examQs={examQs} timerSecs={timerSecs} shuffleOpts={shuffleOpts} onFinish={a=>{setExamAnswers(a);setPage('results')}} onExit={()=>setPage('menu')}/>
      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
  if(page==='results')return(
    <div style={{background:'var(--g0)',minHeight:'100vh'}}>
      <Results examQs={examQs} answers={examAnswers} meta={examMeta} profileId={activeProfile?.id||'admin'} onBack={()=>setPage('menu')} addHistory={addHistory}/>
      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );

  const isAdmin=!!adminUser;

  return(
    <div className="shell">
      {/* Mobile overlay */}
      <div className={`mob-overlay${sidebarOpen?' open':''}`} onClick={closeSidebar}/>

      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="sb-head">
          <div className="sb-brand"><div className="sb-ico">📚</div><div><div className="sb-name">Sınav Sistemi</div><div className="sb-ver">v5.0</div></div></div>
        </div>
        <nav className="sb-nav">
          <div className="nav-sec">Sınav</div>
          <button className={`ni${page==='menu'?' active':''}`} onClick={()=>{setPage('menu');closeSidebar()}}><span className="ni-ico">🏠</span>Sınav Başlat</button>
          {activeProfile&&<button className={`ni${page==='history'?' active':''}`} onClick={()=>{setPage('history');closeSidebar()}}><span className="ni-ico">📊</span>Geçmişim<span className="nb nb-p">{history.filter(h=>h.profileId===activeProfile.id).length}</span></button>}

          {isAdmin&&(
            <>
              <div className="nav-sec admin-only" style={{marginTop:8}}>Yönetim</div>
              <button className={`ni admin-only${page==='questions'?' active':''}`} onClick={()=>{setPage('questions');closeSidebar()}}><span className="ni-ico">📋</span>Soru Yönetimi<span className="nb nb-p">{questions.length}</span></button>
              <button className={`ni admin-only${page==='categories'?' active':''}`} onClick={()=>{setPage('categories');closeSidebar()}}><span className="ni-ico">📂</span>Kategori Yönetimi</button>
              <button className={`ni admin-only${page==='settings'?' active':''}`} onClick={()=>{setPage('settings');closeSidebar()}}><span className="ni-ico">⚙️</span>Ayarlar<span className="nb nb-g">{timerSecs}s</span></button>
            </>
          )}
          {!isAdmin&&(
            <>
              <div className="nav-sec admin-only" style={{marginTop:8}}>Yönetim</div>
              <button className="ni admin-only" onClick={()=>setShowAdminLogin(true)}><span className="ni-ico">🔐</span>Yönetici Girişi</button>
            </>
          )}
        </nav>
        <div className="sb-foot">
          {activeProfile&&(
            <div className="prof-row">
              <div className="prof-av-sm" style={{background:activeProfile.color}}>{activeProfile.emoji}</div>
              <div style={{flex:1,overflow:'hidden'}}><div className="prof-n">{activeProfile.name}</div><div className="prof-r">Öğrenci</div></div>
              <button className="btn-lo" title="Profil değiştir" onClick={()=>{setActiveProfile(null);setPage('menu')}}>⇄</button>
            </div>
          )}
          {isAdmin&&(
            <div className="prof-row" style={{marginTop:activeProfile?6:0}}>
              <div className="prof-av-sm" style={{background:'var(--V)'}}>🔐</div>
              <div style={{flex:1,overflow:'hidden'}}><div className="prof-n">{adminUser.name}</div><div className="prof-r">{adminUser.role}</div></div>
              <button className="btn-lo" title="Admin çıkış" onClick={logout}>⏏</button>
            </div>
          )}
        </div>
      </div>

      <div className="main">
        {/* Mobile topbar */}
        <div className="mob-bar">
          <button className="mob-toggle" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
          <div style={{color:'white',fontSize:14,fontWeight:600}}>📚 Sınav Sistemi</div>
          <div style={{width:36}}/>
        </div>

        {page==='menu'&&<ExamMenu questions={questions} onStart={startExam} timerSecs={timerSecs}/>}
        {page==='history'&&activeProfile&&<History history={history} setHistory={setHistory} profileId={activeProfile.id}/>}
        {page==='questions'&&isAdmin&&(
          <><div className="topbar"><div><div className="tb-title">📋 Soru Yönetimi</div><div className="tb-sub">{questions.length} soru</div></div></div><div className="pg"><QManager questions={questions} setQuestions={setQuestions} showToast={showToast}/></div></>
        )}
        {page==='categories'&&isAdmin&&(
          <><div className="topbar"><div><div className="tb-title">📂 Kategori Yönetimi</div><div className="tb-sub">{[...new Set(questions.map(q=>q.category))].length} kategori</div></div></div><div className="pg"><CatManager questions={questions} setQuestions={setQuestions} showToast={showToast}/></div></>
        )}
        {page==='settings'&&isAdmin&&<Settings timerSecs={timerSecs} setTimerSecs={setTimerSecs} shuffleQ={shuffleQ} setShuffleQ={setShuffleQ} shuffleOpts={shuffleOpts} setShuffleOpts={setShuffleOpts} showToast={showToast}/>}
      </div>

      {showAdminLogin&&<AdminLogin onLogin={u=>{setAdminUser(u);ss('exam_admin_user',u);setShowAdminLogin(false)}} onBack={()=>setShowAdminLogin(false)}/>}
      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
