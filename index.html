<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapsül Soru Platformu</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --primary-red: #8b0000;
            --white: #ffffff;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e29000 0%, #8b4513 100%); /* Görseldeki gibi sıcak tonlar */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Ana Soru Kapsülü */
        .question-box {
            background: var(--white);
            padding: 40px;
            border-radius: 50px; /* Tam kapsül formu */
            border: 4px solid var(--primary-red);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        /* Seçenek Kapsülleri */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option {
            background: var(--white);
            padding: 15px 25px;
            border-radius: 40px;
            border: 2px solid var(--primary-red);
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .option:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option-letter {
            background: var(--primary-red);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-weight: bold;
        }

        /* Doğru-Yanlış Renkleri */
        .correct { background-color: var(--success) !important; color: white !important; }
        .wrong { background-color: var(--error) !important; color: white !important; }

        /* Yönetim Paneli */
        .admin-panel {
            margin-top: 30px;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
        }

        input[type="file"] { margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: var(--primary-red); color: white; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-area">
        <div class="question-box" id="questionText">Soru yüklemek için lütfen Excel (CSV) seçin veya manuel ekleyin.</div>
        
        <div class="options-grid">
            <div class="option" onclick="checkAnswer('A')"><span class="option-letter">A</span> <span id="optA">-</span></div>
            <div class="option" onclick="checkAnswer('B')"><span class="option-letter">B</span> <span id="optB">-</span></div>
            <div class="option" onclick="checkAnswer('C')"><span class="option-letter">C</span> <span id="optC">-</span></div>
            <div class="option" onclick="checkAnswer('D')"><span class="option-letter">D</span> <span id="optD">-</span></div>
        </div>
    </div>

    <div class="admin-panel">
        <h3>Soru Yönetimi</h3>
        <p>CSV Formatı: <i>Soru, A, B, C, D, DoğruCevap(A-D)</i></p>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="loadCSV()">CSV Yükle</button>
    </div>
</div>

<script>
    let questions = [];
    let currentIdx = 0;

    function loadCSV() {
        const fileInput = document.getElementById('csvFile');
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n');
            questions = rows.map(row => {
                const cols = row.split(',');
                return {
                    q: cols[0], a: cols[1], b: cols[2], c: cols[3], d: cols[4], correct: cols[5]?.trim()
                };
            }).filter(item => item.q);
            
            showQuestion(0);
        };
        reader.readAsText(file);
    }

    function showQuestion(idx) {
        if(questions.length === 0) return;
        const q = questions[idx];
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('optA').innerText = q.a;
        document.getElementById('optB').innerText = q.b;
        document.getElementById('optC').innerText = q.c;
        document.getElementById('optD').innerText = q.d;
        
        // Reset renkler
        document.querySelectorAll('.option').forEach(el => el.className = 'option');
    }

    function checkAnswer(choice) {
        const correct = questions[currentIdx].correct;
        const options = document.querySelectorAll('.option');
        
        if(choice === correct) {
            alert("Tebrikler! Doğru cevap.");
            currentIdx++;
            if(currentIdx < questions.length) showQuestion(currentIdx);
        } else {
            alert("Maalesef yanlış cevap.");
        }
    }
</script>

</body>
</html>
